name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'dist/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/configure-pages@v6
      
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      
      - uses: actions/deploy-pages@v5